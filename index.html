<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <link rel="icon" href="/favicon.ico" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Radon Games | Unblocked</title>
    
    <script>
      // Empêche le crash si un bloqueur de pub est présent
      window.adsbygoogle = window.adsbygoogle || [];
      window.adsbygoogle.loaded = true;
    </script>

    <script src="/scram/scramjet.all.js"></script>    
  </head>
  <body class="scroll-smooth bg-bg-primary font-medium text-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      async function setupProxy() {
        if (typeof $scramjetLoadController === 'undefined') {
          console.log("En attente du chargement de Scramjet...");
          setTimeout(setupProxy, 200);
          return;
        }

        try {
          const { ScramjetController } = $scramjetLoadController();
          const scramjet = new ScramjetController({
            prefix: "/~/sj/",
            // SERVEUR BARE PUBLIC (Lien nettoyé)
            bare: "[https://bare.benroxy.com/](https://bare.benroxy.com/)", 
            files: {
              wasm: "/scram/scramjet.wasm.wasm",
              all: "/scram/scramjet.all.js",
              sync: "/scram/scramjet.sync.js",
            },
          });
          await scramjet.init();
          window.scram = scramjet;
          console.log("Proxy Scramjet initialisé avec succès !");
        } catch (err) {
          console.error("Erreur d'initialisation Scramjet :", err);
        }
      }
      setupProxy();
    </script>
  </body>
</html>
