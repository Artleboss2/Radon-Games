  <body class="scroll-smooth bg-bg-primary font-medium text-text-primary">

    <!-- Charger l'application React/Vite -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- FIX 2 : Initialisation sécurisée de Scramjet -->
    <script>
      function initScramjet() {
        if (typeof $scramjetLoadController === 'function') {
          try {
            const { ScramjetController } = $scramjetLoadController();
            const scramjet = new ScramjetController({
              prefix: "/~/sj/",
              // IMPORTANT : On utilise un serveur bare externe car Vercel ne supporte pas le Bare local
              bare: "[https://bare.benroxy.com/](https://bare.benroxy.com/)", 
              files: {
                wasm: "/scram/scramjet.wasm.wasm",
                all: "/scram/scramjet.all.js",
                sync: "/scram/scramjet.sync.js",
              },
              flags: {
                rewriterLogs: false,
                naiiveRewriter: false,
                scramitize: false,
              },
            });
            scramjet.init();
            window.scram = scramjet;
            console.log("Scramjet initialisé avec succès");
          } catch (e) {
            console.error("Erreur lors de l'initialisation de Scramjet:", e);
          }
        } else {
          // Si le script n'est pas encore prêt, on réessaie dans 100ms
          setTimeout(initScramjet, 100);
        }
      }

      // Lancer l'initialisation
      initScramjet();
    </script>
  </body>
